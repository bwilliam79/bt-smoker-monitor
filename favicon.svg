<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Smoke puffs -->
  <circle cx="22" cy="3"   r="2"   fill="#9ca3af" opacity="0.75"/>
  <circle cx="24.5" cy="1.5" r="1.4" fill="#9ca3af" opacity="0.55"/>
  <!-- Chimney -->
  <rect x="20" y="4" width="4" height="7" rx="1" fill="#c2410c"/>
  <!-- Lid dome -->
  <path d="M4 16 Q4 9 16 9 Q28 9 28 16 Z" fill="#ea580c"/>
  <!-- Handle -->
  <rect x="13" y="7" width="6" height="3" rx="1.5" fill="#fbbf24"/>
  <!-- Smoker body -->
  <rect x="4" y="16" width="24" height="10" rx="2" fill="#f97316"/>
  <!-- Firebox door -->
  <rect x="6" y="18" width="5" height="5" rx="1" fill="#7c2d12"/>
  <!-- Vent slits on door -->
  <line x1="7.5" y1="19.5" x2="9.5" y2="19.5" stroke="#f97316" stroke-width="0.8"/>
  <line x1="7.5" y1="21"   x2="9.5" y2="21"   stroke="#f97316" stroke-width="0.8"/>
  <line x1="7.5" y1="22.5" x2="9.5" y2="22.5" stroke="#f97316" stroke-width="0.8"/>
  <!-- Legs -->
  <rect x="7"  y="26" width="3" height="5" rx="1" fill="#9a3412"/>
  <rect x="22" y="26" width="3" height="5" rx="1" fill="#9a3412"/>
</svg>
